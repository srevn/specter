[log]
level = "debug"

[[watch]]
name          = "build"
path          = "/"
actions       = [{ exec = ["make", "--input=${specter.path}", "${specter.created}"] }]
recursive     = true
pattern       = "**/*.{c,h,rs}"
exclude       = ["target/**", "**/node_modules/**"]
hidden        = false
settle        = "500ms"
max_settle    = "30s"
scope         = "subtree-root"
max_depth     = 5
events        = ["structure", "content"]
