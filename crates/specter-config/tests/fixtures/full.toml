[log]
level = "debug"

[[watch]]
name          = "build"
path          = "/"
command       = ["make", "--input=$path", "$created"]
recursive     = true
pattern       = "**/*.{c,h,rs}"
exclude       = ["target/**", "**/node_modules/**"]
hidden        = false
settle_ms     = 500
max_settle_ms = 30000
scope         = "subtree-root"
max_depth     = 5
events        = ["structure", "content"]
