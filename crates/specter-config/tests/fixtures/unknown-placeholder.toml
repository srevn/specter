[[watch]]
name    = "build"
path    = "/"
# Typo inside the Specter namespace: `${specter.paht}` is a well-formed
# placeholder reference but `paht` isn't in the catalog. Bare `$paht`
# would now pass through as a literal — shell territory — so the typo
# guard fires only inside the explicit namespace.
actions = [{ exec = ["fmt", "${specter.paht}"] }]
